function createExcelBlob(sheets) {
  let h="";
  sheets.forEach(sh=>{
    h+=`<h2>${sh.name}</h2><table border="1" cellpadding="5" cellspacing="0" style="border-collapse:collapse;font-family:Calibri,sans-serif;font-size:11pt;">`;
    sh.rows.forEach((row,ri)=>{
      h+="<tr>";row.forEach(cell=>{
        const tag=ri===0?"th":"td";
        const st=ri===0?"background:#2d5016;color:#fff;font-weight:bold;padding:8px 12px;white-space:nowrap;":"padding:6px 10px;border:1px solid #ddd;";
        h+=`<${tag} style="${st}">${cell??""}</${tag}>`;
      });h+="</tr>";
    });h+="</table><br/>";
  });
  return new Blob([`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>${sheets.map(s=>`<x:ExcelWorksheet><x:Name>${s.name}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>`).join("")}</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>${h}</body></html>`],{type:"application/vnd.ms-excel"});
}

  const sendToSheets = async () => {
    if(!scriptUrl){setSheetsError("URL du script non configurée. Cliquez sur ⚙️ pour la configurer.");return;}
    setSheetsSending(true);setSheetsError("");
    
    const today = new Date().toLocaleDateString("fr-FR");
    const now = new Date().toLocaleString("fr-FR");
    const rows = [];

    siteOrders.forEach(o=>{
      const id = oid(o);
      getActions(id).forEach(a=>{
        if(a.type==="rupture"){
          rows.push([now, siteName, o.client, o.casier, a.product, "RUPTURE", a.reason, "", prenom, "Distribution"]);

        if(a.type==="remise"){
          rows.push([now, siteName, o.client, o.casier, a.product, "REMISE", a.reason, "-"+a.percent+"%", prenom, "Distribution"]);

        if(a.type==="poids"){
          rows.push([now, siteName, o.client, o.casier, a.product, "MODIF_POIDS", a.oldUnit+" → "+a.newWeight, a.newWeight, prenom, "Distribution"]);

      });
    });

    if(rows.length===0){setSheetsError("Aucune anomalie à envoyer.");setSheetsSending(false);return;}

      const resp = await fetch(scriptUrl, {
        method: "POST",
        headers: {"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({rows}),
        mode: "no-cors"
      });
      // no-cors = opaque response, on ne peut pas lire le body mais ça envoie quand même
      setSheetsSent(true);

            <button onClick={()=>setShowConfig(!showConfig)} style={{background:"transparent",border:"none",fontSize:12,color:C.textL,cursor:"pointer"}}>⚙️ Configuration Sheets</button>

          {showConfig && <div style={{marginTop:10,background:C.grayBg,borderRadius:10,padding:"12px"}}>
            <label style={{fontSize:11,fontWeight:600,color:C.text,display:"block",marginBottom:4}}>URL Google Apps Script</label>
            <input value={scriptUrl} onChange={e=>{setScriptUrl(e.target.value);localStorage.setItem("kbg_script_url",e.target.value)}}
              placeholder="https://script.google.com/macros/s/..."
              style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.grayL}`,fontSize:11,boxSizing:"border-box"}} />
            <p style={{fontSize:10,color:C.textL,marginTop:4}}>Collez l'URL du déploiement de votre Google Apps Script</p>
          </div>}
        </div>
      </div>
    );
  }

  /* ═════════ LIST ═════════ */
  if(page==="list"){
    return (
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{background:C.green,color:"#fff",padding:"14px 16px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
          <div style={{maxWidth:600,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:17,fontWeight:800}}>📦 Distribution</div>
              <div style={{fontSize:12,opacity:.85}}>📍 {siteName} — 👤 {prenom}</div></div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,fontWeight:600}}>{passedCount}/{siteOrders.length}</div>
              <div style={{background:"rgba(255,255,255,.2)",borderRadius:20,height:6,width:80,marginTop:3,overflow:"hidden"}}>
                <div style={{background:"#fff",height:"100%",width:`${siteOrders.length?(passedCount/siteOrders.length)*100:0}%`,borderRadius:20,transition:"width .3s"}} />
              </div>
            </div>
          </div>
        </div>
        <div style={{maxWidth:600,margin:"0 auto",padding:"12px 10px"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher client ou n° casier..."
            style={{width:"100%",padding:"11px 14px",borderRadius:12,border:`2px solid ${C.grayL}`,fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:12}} />

          {siteOrders.length===0&&<div style={{textAlign:"center",padding:40,color:C.textL}}><div style={{fontSize:40,marginBottom:10}}>📭</div><p>Aucune commande.</p></div>}

          {siteOrders.map((order,idx)=>{
            const id=oid(order);const passed=clientsPassed[id];const acts=getActions(id);const prepa=order.prepaAnomalies||[];const hasFlags=prepa.length>0||acts.length>0;
            return (
              <div key={id} style={{background:passed?"#fafafa":C.card,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1.5px solid ${passed?C.passed:hasFlags?C.orange:C.grayL}`,opacity:passed?.5:1,transition:"all .2s",display:"flex",alignItems:"center",gap:10}}>
                <div onClick={e=>{e.stopPropagation();setClientsPassed(p=>({...p,[id]:!p[id]}))}}
                  style={{width:26,height:26,borderRadius:7,border:`2px solid ${passed?C.greenM:C.grayL}`,background:passed?C.greenM:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                  {passed&&<span style={{color:"#fff",fontSize:15,fontWeight:800}}>✓</span>}
                </div>
                <div onClick={()=>{setSelectedIdx(idx);setPage("detail")}} style={{flex:1,cursor:"pointer",minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:passed?C.gray:C.text,textDecoration:passed?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{order.client}</div>
                      <div style={{fontSize:12,color:C.textL,marginTop:1}}>🗄 {siteCode==="DOM"?"Carton":"Casier"} <strong>{order.casier}</strong> · {order.products.length} produit{order.products.length>1?"s":""}</div>
                    </div>
                    <span style={{fontSize:18,color:C.grayL,marginTop:2,flexShrink:0}}>›</span>
                  </div>
                  {hasFlags&&<div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>
                    {prepa.filter(a=>a.type==="RUPTURE").length>0&&<span style={{background:C.redL,color:C.red,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5}}>✕ {prepa.filter(a=>a.type==="RUPTURE").length} rupt. prépa</span>}
                    {acts.filter(a=>a.type==="rupture").length>0&&<span style={{background:C.redL,color:C.red,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5,border:`1px solid ${C.red}`}}>✕ {acts.filter(a=>a.type==="rupture").length} rupt. distrib</span>}
                    {acts.filter(a=>a.type==="remise").length>0&&<span style={{background:C.orangeL,color:C.orange,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5}}>🏷 {acts.filter(a=>a.type==="remise").length} remise{acts.filter(a=>a.type==="remise").length>1?"s":""}</span>}
                    {acts.filter(a=>a.type==="poids").length>0&&<span style={{background:C.blueL,color:C.blue,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5,border:`1px solid ${C.blue}`}}>⚖ modif poids</span>}
                  </div>}
                </div>
              </div>
            );
          })}

          <div style={{marginTop:20,paddingBottom:20}}>
            <button onClick={()=>{setPage("recap");setRecapDone(false);setSheetsSent(false);setSheetsError("")}} style={btn(C.green,"#fff",{width:"100%",fontSize:15,borderRadius:12})}>📊 Envoyer récap du jour</button>
            <button onClick={()=>{setPage("login");setSearch("")}} style={btn(C.grayBg,C.gray,{width:"100%",fontSize:13,marginTop:8,borderRadius:10,padding:"10px 20px"})}>← Changer de site</button>
          </div>
        </div>
      </div>
    );
  }

  /* ═════════ DETAIL ═════════ */
  if(page==="detail"&&selectedIdx!==null){
    const order=siteOrders[selectedIdx];if(!order){setPage("list");return null;}
    const id=oid(order);const prepa=order.prepaAnomalies||[];const acts=getActions(id);
    return (
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{background:C.green,color:"#fff",padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
          <div style={{maxWidth:600,margin:"0 auto",display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setPage("list")} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:16,cursor:"pointer",fontWeight:700}}>←</button>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:16,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{order.client}</div>
              <div style={{fontSize:11,opacity:.85}}>🗄 {siteCode==="DOM"?"Carton":"Casier"} {order.casier} · {siteName}</div>
            </div>
          </div>
        </div>
        <div style={{maxWidth:600,margin:"0 auto",padding:"14px 10px"}}>
          {(order.telephone||order.email)&&<div style={{background:C.blueL,borderRadius:12,padding:"10px 12px",marginBottom:12,fontSize:13}}>
            <span style={{fontWeight:700,color:C.blue}}>📇</span>{" "}
            {order.telephone&&<a href={`tel:${order.telephone}`} style={{color:C.green,fontWeight:600,textDecoration:"none"}}>📞 {order.telephone}</a>}
            {order.telephone&&order.email&&" — "}
            {order.email&&<span>📧 {order.email}</span>}
          </div>}

          {prepa.length>0&&<div style={{background:C.orangeL,borderRadius:12,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,color:C.orange,marginBottom:6}}>⚠️ Anomalies prépa ({prepa.length})</div>
            {prepa.map((a,i)=><div key={i} style={{fontSize:13,padding:"3px 0",borderBottom:i<prepa.length-1?"1px solid rgba(212,118,10,.12)":"none"}}>
              <span style={{color:a.type==="RUPTURE"?C.red:C.blue,fontWeight:700}}>{a.type==="RUPTURE"?"✕ Rupture":"⚖ Modif"}</span> — {a.product} {a.qty>1?`(×${a.qty})`:""}
            </div>)}
          </div>}

          {acts.length>0&&<div style={{background:C.redL,borderRadius:12,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,color:C.red,marginBottom:6}}>🔧 Actions distribution ({acts.length})</div>
            {acts.map(a=><div key={a.id} style={{fontSize:13,padding:"5px 0",borderBottom:"1px solid rgba(192,57,43,.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}}>
                {a.type==="rupture"&&<span><span style={{color:C.red,fontWeight:700}}>✕ Rupture</span> — {a.product} — {a.reason}</span>}
                {a.type==="remise"&&<span><span style={{color:C.orange,fontWeight:700}}>🏷 -{a.percent}%</span> — {a.product} — {a.reason}</span>}
                {a.type==="poids"&&<span><span style={{color:C.blue,fontWeight:700}}>⚖</span> — {a.product} → {a.newWeight}</span>}
              </div>
              <button onClick={()=>removeAction(id,a.id)} style={{background:"transparent",border:"none",color:C.red,cursor:"pointer",fontSize:18,padding:"0 4px",flexShrink:0}}>×</button>
            </div>)}
          </div>}

          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:8}}>🛒 Commande ({order.products.length} produit{order.products.length>1?"s":""})</div>
          {order.products.map((p,pi)=>{
            const isRupP=prepa.some(a=>a.type==="RUPTURE"&&norm(a.product)===norm(p.name));
            const isRupD=acts.some(a=>a.type==="rupture"&&norm(a.product)===norm(p.name));
            const hasRem=acts.some(a=>a.type==="remise"&&norm(a.product)===norm(p.name));
            const hasPo=acts.some(a=>a.type==="poids"&&norm(a.product)===norm(p.name));
            const isRup=isRupP||isRupD;
            return (
              <div key={pi} style={{background:isRup?C.redL:hasRem?C.orangeL:hasPo?C.blueL:C.card,borderRadius:12,padding:"10px 12px",marginBottom:6,border:`1.5px solid ${isRup?C.red:hasRem?C.orange:hasPo?C.blue:C.grayL}`}}>
                <div style={{fontWeight:600,fontSize:13,color:isRup?C.red:C.text,textDecoration:isRup?"line-through":"none"}}>{p.name}</div>
                <div style={{fontSize:11,color:C.textL,marginTop:2}}>×{p.qty} · {p.unit} · <em>{p.producer}</em></div>
                {isRupP&&<div style={{fontSize:10,color:C.red,fontWeight:600,marginTop:3}}>✕ Rupture prépa</div>}
                {isRupD&&!isRupP&&<div style={{fontSize:10,color:C.red,fontWeight:600,marginTop:3}}>✕ Rupture distribution</div>}
                {hasRem&&<div style={{fontSize:10,color:C.orange,fontWeight:600,marginTop:3}}>🏷 Remise appliquée</div>}
                {hasPo&&<div style={{fontSize:10,color:C.blue,fontWeight:600,marginTop:3}}>⚖ Poids modifié</div>}
                {!isRup&&<div style={{display:"flex",gap:5,marginTop:8}}>
                  <button onClick={()=>{setModal({type:"rupture",pi});setRuptureReason("Produit manquant")}} style={btn(C.redL,C.red,{fontSize:11,padding:"5px 9px",borderRadius:7})}>✕ Rupture</button>
                  <button onClick={()=>{setModal({type:"remise",pi});setRemisePct("10");setRemiseReason("")}} style={btn(C.orangeL,C.orange,{fontSize:11,padding:"5px 9px",borderRadius:7})}>🏷 Remise</button>
                  <button onClick={()=>{setModal({type:"poids",pi});setNewPoids("")}} style={btn(C.blueL,C.blue,{fontSize:11,padding:"5px 9px",borderRadius:7})}>⚖ Poids</button>
                </div>}
              </div>
            );
          })}

          <button onClick={()=>setClientsPassed(p=>({...p,[id]:!p[id]}))} style={btn(clientsPassed[id]?C.grayBg:C.green,clientsPassed[id]?C.gray:"#fff",{width:"100%",fontSize:15,marginTop:16,borderRadius:12})}>
            {clientsPassed[id]?"↩ Annuler — non passé":"✓ Client passé"}
          </button>
          <button onClick={()=>setPage("list")} style={btn(C.grayBg,C.text,{width:"100%",fontSize:13,marginTop:8,borderRadius:10,padding:"10px",marginBottom:20})}>← Retour</button>
        </div>

        {modal&&(()=>{
          const p=order.products[modal.pi];
          const ov={position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16};
          const bx={background:"#fff",borderRadius:16,padding:"22px 18px",width:"100%",maxWidth:360};
          if(modal.type==="rupture")return(<div style={ov} onClick={()=>setModal(null)}><div style={bx} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 4px",fontSize:16,color:C.red}}>✕ Rupture</h3>
            <p style={{fontSize:13,color:C.textL,margin:"0 0 14px"}}>{p.name}</p>
            <label style={{fontSize:13,fontWeight:600}}>Raison</label>
            <select value={ruptureReason} onChange={e=>setRuptureReason(e.target.value)} style={{width:"100%",padding:"10px",borderRadius:8,border:`1.5px solid ${C.grayL}`,fontSize:14,marginTop:4,marginBottom:14,boxSizing:"border-box"}}>
              <option>Produit manquant</option><option>Produit abîmé</option><option>Produit périmé</option><option>Erreur de commande</option><option>Autre</option>
            </select>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal(null)} style={btn(C.grayBg,C.gray,{flex:1})}>Annuler</button>
              <button onClick={()=>{addAction(id,{type:"rupture",product:p.name,reason:ruptureReason});setModal(null)}} style={btn(C.red,"#fff",{flex:1})}>Confirmer</button>
            </div>
          </div></div>);
          if(modal.type==="remise")return(<div style={ov} onClick={()=>setModal(null)}><div style={bx} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 4px",fontSize:16,color:C.orange}}>🏷 Remise</h3>
            <p style={{fontSize:13,color:C.textL,margin:"0 0 14px"}}>{p.name}</p>
            <label style={{fontSize:13,fontWeight:600}}>Pourcentage</label>
            <div style={{display:"flex",gap:6,marginTop:4,marginBottom:10,flexWrap:"wrap"}}>
              {[5,10,15,20,25,30,50].map(v=><button key={v} onClick={()=>setRemisePct(String(v))} style={btn(remisePct===String(v)?C.orange:C.orangeL,remisePct===String(v)?"#fff":C.orange,{padding:"7px 12px",fontSize:13,borderRadius:8})}>-{v}%</button>)}
            </div>
            <label style={{fontSize:13,fontWeight:600}}>Raison</label>
            <input value={remiseReason} onChange={e=>setRemiseReason(e.target.value)} placeholder="Ex: œuf cassé"
              style={{width:"100%",padding:"10px",borderRadius:8,border:`1.5px solid ${C.grayL}`,fontSize:14,marginTop:4,marginBottom:14,boxSizing:"border-box"}} />
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal(null)} style={btn(C.grayBg,C.gray,{flex:1})}>Annuler</button>
              <button onClick={()=>{if(!remiseReason.trim())return alert("Indique la raison");addAction(id,{type:"remise",product:p.name,percent:remisePct,reason:remiseReason});setModal(null)}} style={btn(C.orange,"#fff",{flex:1})}>Appliquer</button>
            </div>
          </div></div>);
          if(modal.type==="poids")return(<div style={ov} onClick={()=>setModal(null)}><div style={bx} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 4px",fontSize:16,color:C.blue}}>⚖ Modifier poids</h3>
            <p style={{fontSize:13,color:C.textL,margin:"0 0 2px"}}>{p.name}</p>
            <p style={{fontSize:12,color:C.textL,margin:"0 0 14px"}}>Prévu : {p.unit}</p>
            <label style={{fontSize:13,fontWeight:600}}>Nouveau poids</label>
            <input value={newPoids} onChange={e=>setNewPoids(e.target.value)} placeholder="Ex: 420g"
              style={{width:"100%",padding:"10px",borderRadius:8,border:`1.5px solid ${C.grayL}`,fontSize:14,marginTop:4,marginBottom:14,boxSizing:"border-box"}} />
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal(null)} style={btn(C.grayBg,C.gray,{flex:1})}>Annuler</button>
              <button onClick={()=>{if(!newPoids.trim())return alert("Indique le poids");addAction(id,{type:"poids",product:p.name,oldUnit:p.unit,newWeight:newPoids});setModal(null)}} style={btn(C.blue,"#fff",{flex:1})}>Modifier</button>
            </div>
          </div></div>);
        })()}
      </div>
    );
  }

  /* ═════════ RECAP ═════════ */
  if(page==="recap"){
    const rup=[],rem=[],poi=[];
    siteOrders.forEach(o=>{getActions(oid(o)).forEach(a=>{
      if(a.type==="rupture")rup.push({...a,client:o.client,casier:o.casier});
      if(a.type==="remise")rem.push({...a,client:o.client,casier:o.casier});
      if(a.type==="poids")poi.push({...a,client:o.client,casier:o.casier});
    });});
    const notP=siteOrders.filter(o=>!clientsPassed[oid(o)]).map(o=>({...o,contactBy:o.telephone?"Distributeur (tél)":o.email?"Henry (mail)":"Aucun contact"}));
    const byD=notP.filter(c=>c.contactBy==="Distributeur (tél)");
    const byH=notP.filter(c=>c.contactBy==="Henry (mail)");
    const noC=notP.filter(c=>c.contactBy==="Aucun contact");
    const totalAnomalies=rup.length+rem.length+poi.length;

    return (
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{background:C.green,color:"#fff",padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
          <div style={{maxWidth:600,margin:"0 auto",display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setPage("list")} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:16,cursor:"pointer",fontWeight:700}}>←</button>
            <div style={{fontSize:17,fontWeight:800}}>📊 Récap — {siteName}</div>
          </div>
        </div>
        <div style={{maxWidth:600,margin:"0 auto",padding:"14px 10px"}}>
          {sheetsSent&&<div style={{background:C.greenL,borderRadius:12,padding:"14px",marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:28}}>✅</div>
            <div style={{fontWeight:700,color:C.green,fontSize:15}}>Envoyé dans Google Sheets !</div>
            <p style={{fontSize:12,color:C.textL,margin:"4px 0 0"}}>Les anomalies distribution sont dans l'onglet "Anomalies Distribution"</p>
          </div>}
          {recapDone&&!sheetsSent&&<div style={{background:C.greenL,borderRadius:12,padding:"14px",marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:28}}>📥</div>
            <div style={{fontWeight:700,color:C.green,fontSize:15}}>Excel téléchargé !</div>
          </div>}
          {sheetsError&&<div style={{background:C.redL,borderRadius:12,padding:"12px",marginBottom:14,fontSize:13,color:C.red}}>{sheetsError}</div>}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
            {[{l:"Commandes",v:siteOrders.length,c:C.green},{l:"Passés",v:passedCount,c:C.greenM},{l:"Non passés",v:siteOrders.length-passedCount,c:C.orange},{l:"Rupt. distrib",v:rup.length,c:C.red},{l:"Remises",v:rem.length,c:C.orange},{l:"Modif poids",v:poi.length,c:C.blue}].map((s,i)=>
              <div key={i} style={{background:C.card,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.grayL}`}}>
                <div style={{fontSize:11,color:C.textL}}>{s.l}</div>
                <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
              </div>
            )}
          </div>

          {notP.length>0&&<div style={{background:C.card,borderRadius:14,padding:"14px",marginBottom:14,border:`1.5px solid ${C.orange}`}}>
            <h3 style={{margin:"0 0 10px",fontSize:14,color:C.orange}}>⏳ Clients non passés ({notP.length})</h3>
            {byD.length>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>📞 À appeler par vous ({byD.length})</div>
              {byD.map((c,i)=><div key={i} style={{fontSize:13,padding:"3px 0",display:"flex",justifyContent:"space-between"}}>
                <span>{c.client} ({siteCode==="DOM"?"cart.":"cas."} {c.casier})</span>
                <a href={`tel:${c.telephone}`} style={{color:C.green,fontWeight:600,textDecoration:"none"}}>{c.telephone}</a>
              </div>)}
            </div>}
            {byH.length>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>📧 Henry contactera ({byH.length})</div>
              {byH.map((c,i)=><div key={i} style={{fontSize:13,padding:"3px 0"}}>{c.client} ({siteCode==="DOM"?"cart.":"cas."} {c.casier}) — {c.email}</div>)}
            </div>}
            {noC.length>0&&<div>
              <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:4}}>⚠️ Aucun contact ({noC.length})</div>
              {noC.map((c,i)=><div key={i} style={{fontSize:13,padding:"3px 0",color:C.textL}}>{c.client} ({siteCode==="DOM"?"cart.":"cas."} {c.casier})</div>)}
            </div>}
          </div>}

          {rup.length>0&&<div style={{background:C.card,borderRadius:14,padding:"14px",marginBottom:14,border:`1.5px solid ${C.red}`}}>
            <h3 style={{margin:"0 0 8px",fontSize:14,color:C.red}}>✕ Ruptures distribution</h3>
            {rup.map((r,i)=><div key={i} style={{fontSize:13,padding:"4px 0",borderBottom:i<rup.length-1?`1px solid ${C.grayL}`:"none"}}><strong>{r.client}</strong> (cas. {r.casier}) — {r.product} — <em>{r.reason}</em></div>)}
          </div>}
          {rem.length>0&&<div style={{background:C.card,borderRadius:14,padding:"14px",marginBottom:14,border:`1.5px solid ${C.orange}`}}>
            <h3 style={{margin:"0 0 8px",fontSize:14,color:C.orange}}>🏷 Remises</h3>
            {rem.map((r,i)=><div key={i} style={{fontSize:13,padding:"4px 0",borderBottom:i<rem.length-1?`1px solid ${C.grayL}`:"none"}}><strong>{r.client}</strong> (cas. {r.casier}) — {r.product} — <strong>-{r.percent}%</strong> — <em>{r.reason}</em></div>)}
          </div>}
          {poi.length>0&&<div style={{background:C.card,borderRadius:14,padding:"14px",marginBottom:14,border:`1.5px solid ${C.blue}`}}>
            <h3 style={{margin:"0 0 8px",fontSize:14,color:C.blue}}>⚖ Modifications de poids</h3>
            {poi.map((r,i)=><div key={i} style={{fontSize:13,padding:"4px 0",borderBottom:i<poi.length-1?`1px solid ${C.grayL}`:"none"}}><strong>{r.client}</strong> (cas. {r.casier}) — {r.product} — {r.oldUnit} → <strong>{r.newWeight}</strong></div>)}
          </div>}

          {/* BOUTONS ENVOI */}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={sendToSheets} disabled={sheetsSending||sheetsSent||totalAnomalies===0}
              style={btn(sheetsSent?C.grayBg:C.greenM,sheetsSent?C.gray:"#fff",{flex:1,fontSize:14,borderRadius:12,opacity:sheetsSending||sheetsSent||totalAnomalies===0?.6:1})}>
              {sheetsSending?"⏳ Envoi...":sheetsSent?"✅ Envoyé":"📊 Envoyer dans Sheets"}
            </button>
            <button onClick={generateRecap} style={btn(C.green,"#fff",{flex:1,fontSize:14,borderRadius:12})}>
              📥 Excel complet
            </button>
          </div>
          <button onClick={()=>setPage("list")} style={btn(C.grayBg,C.text,{width:"100%",fontSize:13,marginTop:8,borderRadius:10,padding:"10px",marginBottom:20})}>← Retour</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
